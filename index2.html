<!--
צ׳קליסט קשיח לפני כתיבת הקוד:
1. האם וידאתי ש־mode: 'no-cors' לא מופיע בכלל בקוד? כן.
2. האם אכפתי את שמות המפתחות המדויקים ב־payload: tickers, startDate, endDate, frequency, action? כן.
-->

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת חילוץ נתוני מניות</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      overflow-x: hidden;
    }

    .mesh {
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.28), transparent 32%),
        radial-gradient(circle at 80% 25%, rgba(59, 130, 246, 0.28), transparent 30%),
        radial-gradient(circle at 45% 80%, rgba(168, 85, 247, 0.24), transparent 34%),
        linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
      animation: floatMesh 14s ease-in-out infinite alternate;
    }

    @keyframes floatMesh {
      0% { background-position: 0% 0%, 100% 0%, 50% 100%, center; }
      100% { background-position: 12% 8%, 85% 20%, 60% 88%, center; }
    }

    .particle {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.32);
      animation: rise 12s linear infinite;
    }

    @keyframes rise {
      from { transform: translateY(110vh) scale(0.7); opacity: 0; }
      20% { opacity: 0.7; }
      to { transform: translateY(-20vh) scale(1.15); opacity: 0; }
    }

    .glow-button {
      box-shadow: 0 0 25px rgba(34, 197, 94, 0.55), inset 0 0 18px rgba(255, 255, 255, 0.18);
      animation: pulseGlow 2.2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 22px rgba(34, 197, 94, 0.45); }
      50% { box-shadow: 0 0 42px rgba(34, 197, 94, 0.78); }
    }

    .loader-ring {
      width: 58px;
      height: 58px;
      border: 5px solid rgba(255, 255, 255, 0.22);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body class="min-h-screen mesh text-slate-900">
  <div id="particles" class="fixed inset-0 pointer-events-none"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-6xl backdrop-blur-xl bg-white/80 shadow-2xl rounded-[2rem] border border-white/60 overflow-hidden">
      <div class="p-6 md:p-10 lg:p-12">
        <div class="mb-8">
          <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 text-emerald-700 font-bold text-sm mb-5">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            מערכת פיננסית חכמה
          </div>

          <h1 class="text-3xl md:text-5xl font-black tracking-tight text-slate-950 mb-4">
            חילוץ והשוואת שערי סגירה
          </h1>

          <p class="text-lg md:text-xl leading-9 text-slate-700 max-w-4xl">
            ברוכים הבאים למערכת חילוץ הנתונים. כאן תוכלו לשלוף שערי סגירה למספר מניות במקביל, להשוות ביניהן בסדרות-זמן, ולייצא בקליק.
          </p>
        </div>

        <form id="dataForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-7">
          <div class="lg:col-span-1">
            <label for="tickers" class="block text-sm font-bold text-slate-700 mb-2">סימולי מניות</label>
            <input id="tickers" type="text" placeholder="AAPL, MSFT, TSLA"
              class="w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-4 outline-none focus:ring-4 focus:ring-emerald-400/30 focus:border-emerald-500 shadow-sm transition" />
            <p class="text-xs text-slate-500 mt-2">הזן סימולי מניות, מופרדים בפסיק</p>
          </div>

          <div>
            <label for="startDate" class="block text-sm font-bold text-slate-700 mb-2">תאריך התחלה</label>
            <input id="startDate" type="date"
              class="w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-4 outline-none focus:ring-4 focus:ring-blue-400/30 focus:border-blue-500 shadow-sm transition" />
          </div>

          <div>
            <label for="endDate" class="block text-sm font-bold text-slate-700 mb-2">תאריך סיום</label>
            <input id="endDate" type="date"
              class="w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-4 outline-none focus:ring-4 focus:ring-blue-400/30 focus:border-blue-500 shadow-sm transition" />
          </div>

          <div>
            <label for="frequency" class="block text-sm font-bold text-slate-700 mb-2">תדירות</label>
            <select id="frequency"
              class="w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-4 outline-none focus:ring-4 focus:ring-purple-400/30 focus:border-purple-500 shadow-sm transition">
              <option value="daily">יומי</option>
              <option value="weekly">שבועי</option>
              <option value="monthly">חודשי</option>
            </select>
          </div>
        </form>

        <button id="loadBtn"
          class="glow-button w-full rounded-2xl bg-gradient-to-l from-emerald-500 via-teal-500 to-cyan-500 text-white font-black text-lg py-5 hover:scale-[1.01] active:scale-[0.99] transition">
          טען נתונים
        </button>

        <div id="alertBox" class="hidden mt-6 rounded-2xl p-5 font-bold"></div>

        <div id="loader" class="hidden mt-8 flex flex-col items-center justify-center gap-4 rounded-3xl bg-slate-950/90 text-white p-8">
          <div class="loader-ring"></div>
          <p class="text-lg font-bold">מושך נתוני שוק...</p>
          <p class="text-sm text-slate-300">בודק שערים, מסדר תאריכים ומכין תצוגה</p>
        </div>

        <div id="previewTable" class="mt-8"></div>

        <div id="exportActions" class="hidden mt-7 grid grid-cols-1 md:grid-cols-2 gap-4">
          <button id="downloadCsvBtn"
            class="rounded-2xl bg-slate-950 text-white font-black py-4 shadow-xl hover:bg-slate-800 transition">
            הורד כ-CSV
          </button>

          <button id="exportSheetBtn"
            class="rounded-2xl bg-gradient-to-l from-blue-600 to-indigo-600 text-white font-black py-4 shadow-xl hover:scale-[1.01] active:scale-[0.99] transition">
            ייצא ל-Google Sheets
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const WEB_APP_URL = "[!!! REPLACE_WITH_YOUR_DEPLOYED_WEB_APP_URL !!!]";
    const SHEET_LINK = "https://script.google.com/macros/s/AKfycbynUlCcvF9T71c0-dCcsBcAKRMbxS-tx_ARnAVEKrhjXL-ht-uyl_8meCk0drpZl2Q/execl";

    let globalCsvData = "";

    const particles = document.getElementById("particles");
    for (let i = 0; i < 42; i++) {
      const p = document.createElement("span");
      p.className = "particle";
      p.style.width = Math.random() * 5 + 2 + "px";
      p.style.height = p.style.width;
      p.style.left = Math.random() * 100 + "%";
      p.style.animationDelay = Math.random() * 12 + "s";
      p.style.animationDuration = Math.random() * 9 + 9 + "s";
      particles.appendChild(p);
    }

    document.getElementById("loadBtn").addEventListener("click", loadData);
    document.getElementById("downloadCsvBtn").addEventListener("click", downloadCsv);
    document.getElementById("exportSheetBtn").addEventListener("click", exportSheet);

    async function loadData() {
      clearState();

      if (!validateForm()) return;

      showLoader(true);

      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: 'csv'
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status !== "success") {
          throw new Error(result.message || "אירעה שגיאה לא צפויה");
        }

        globalCsvData = result.csvData;
        buildPreviewTable(globalCsvData);
        document.getElementById("exportActions").classList.remove("hidden");
        showAlert("הנתונים נטענו בהצלחה. אפשר להוריד CSV או לייצא לגיליון.", "success");

      } catch (err) {
        showAlert("אופס! לא הצלחנו לטעון את הנתונים. " + err.message, "error");
      } finally {
        showLoader(false);
      }
    }

    function validateForm() {
      const tickers = document.getElementById("tickers").value.trim();
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      if (!tickers) {
        showAlert("אופס! צריך להזין לפחות סימול מניה אחד.", "error");
        return false;
      }

      if (!startDate || !endDate) {
        showAlert("אופס! צריך לבחור תאריך התחלה ותאריך סיום.", "error");
        return false;
      }

      if (new Date(startDate) > new Date(endDate)) {
        showAlert("אופס! נראה שתאריך ההתחלה מאוחר מתאריך הסיום...", "error");
        return false;
      }

      return true;
    }

    function buildPreviewTable(csvData) {
      const rows = parseCsv(csvData).slice(0, 7);

      if (!rows.length) {
        showAlert("לא נמצאו נתונים להצגה.", "error");
        return;
      }

      let html = `
        <div class="rounded-3xl overflow-hidden border border-white/70 shadow-2xl bg-white/90">
          <div class="px-6 py-5 bg-slate-950 text-white">
            <h2 class="text-xl font-black">תצוגה מקדימה</h2>
            <p class="text-sm text-slate-300 mt-1">מוצגות עד 6 שורות ראשונות</p>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
      `;

      rows.forEach((row, index) => {
        if (index === 0) {
          html += `<thead><tr class="bg-slate-100">`;
          row.forEach(cell => {
            html += `<th class="px-5 py-4 text-right font-black text-slate-800 border-b">${escapeHtml(cell)}</th>`;
          });
          html += `</tr></thead><tbody>`;
        } else {
          html += `<tr class="hover:bg-emerald-50/70 transition">`;
          row.forEach(cell => {
            html += `<td class="px-5 py-4 border-b border-slate-100 text-slate-700 font-semibold">${escapeHtml(cell)}</td>`;
          });
          html += `</tr>`;
        }
      });

      html += `
            </tbody>
            </table>
          </div>
        </div>
      `;

      document.getElementById("previewTable").innerHTML = html;
    }

    function downloadCsv() {
      if (!globalCsvData) {
        showAlert("אין עדיין נתוני CSV להורדה.", "error");
        return;
      }

      const blob = new Blob([globalCsvData], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "stock-data.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    }

    async function exportSheet() {
      if (!validateForm()) return;

      showLoader(true);
      showAlert("מייצא את הנתונים ל-Google Sheets...", "success");

      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: 'sheet'
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status !== "success") {
          throw new Error(result.message || "הייצוא נכשל");
        }

        const link = result.sheetUrl || SHEET_LINK;

        document.getElementById("alertBox").className =
          "mt-6 rounded-2xl p-5 font-bold bg-emerald-100 text-emerald-800 border border-emerald-200";

        document.getElementById("alertBox").innerHTML = `
          <div class="text-lg font-black mb-2">הייצוא הושלם בהצלחה!</div>
          <a href="${escapeHtml(link)}" target="_blank" class="underline decoration-2 underline-offset-4">
            פתח את הגיליון החדש
          </a>
        `;

        document.getElementById("alertBox").classList.remove("hidden");

      } catch (err) {
        showAlert("אופס! לא הצלחנו לייצא לגיליון. " + err.message, "error");
      } finally {
        showLoader(false);
      }
    }

    function showLoader(isVisible) {
      document.getElementById("loader").classList.toggle("hidden", !isVisible);
    }

    function showAlert(message, type) {
      const box = document.getElementById("alertBox");
      box.classList.remove("hidden");

      if (type === "success") {
        box.className = "mt-6 rounded-2xl p-5 font-bold bg-emerald-100 text-emerald-800 border border-emerald-200";
      } else {
        box.className = "mt-6 rounded-2xl p-5 font-bold bg-rose-100 text-rose-800 border border-rose-200";
      }

      box.textContent = message;
    }

    function clearState() {
      document.getElementById("alertBox").classList.add("hidden");
      document.getElementById("previewTable").innerHTML = "";
      document.getElementById("exportActions").classList.add("hidden");
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (cell || row.length) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === "\r" && next === "\n") i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
